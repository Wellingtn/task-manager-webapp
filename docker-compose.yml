version: '3.8'

services:
  # MySQL - Isolado no nó de banco
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: task_manager
      MYSQL_USER: TASKAPP
      MYSQL_PASSWORD: TaskAppPassword123!
      MYSQL_ROOT_PASSWORD: RootSecurePassword456!
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.tipo == db

  # Backend - Isolado no nó de aplicação
  backend:
    image: victor584198156/taskmanager-backend:v1
    environment:
      DB_HOST: db
      DB_USER: TASKAPP
      DB_PASSWORD: TaskAppPassword123!
      DB_NAME: task_manager
      PORT: 5000
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.tipo == app

  # Frontend - Isolado no nó de aplicação
  frontend:
    image: victor584198156/taskmanager-frontend:v1
    environment:
      API_URL: http://backend:5000
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.tipo == app

  # Proxy Reverso Nginx - Configurado via Docker Configs
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - app-network
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf # Injeta a rota customizada dentro do container
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

networks:
  app-network:
    driver: overlay
    attachable: true

volumes:
  db_data:
    driver: local

# Aqui criamos o arquivo de configuração de forma embutida e distribuída no Swarm
configs:
  nginx_config:
    data: |
      events { worker_connections 1024; }
      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          upstream frontend_server {
              server frontend:80;
          }
          upstream backend_server {
              server backend:5000;
          }
          server {
              listen 80;
              server_name localhost;
              location / {
                  proxy_pass http://frontend_server;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              }
              location /api/ {
                  proxy_pass http://backend_server/;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection "Upgrade";
              }
          }
      }
