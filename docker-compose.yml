version: '3.8'

services:
  backend:
    image: victor584198156/taskmanager-backend:v1 # A imagem que você acabou de subir
    ports:
      - "8080:8080" # Ajuste para a porta real do seu back-end
    deploy:
      mode: replicated
      replicas: 3 # Alta disponibilidade do back-end
      restart_policy:
        condition: on-failure

  frontend:
    image: victor584198156/taskmanager-frontend:v1 # A imagem que você acabou de subir
    ports:
      - "80:80" # Ajuste para a porta real do seu front-end (provavelmente Nginx)
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 3 # Alta disponibilidade do front-end
      restart_policy:
        condition: on-failure
# Testando webhook do Portainer
