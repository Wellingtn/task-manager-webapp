version: '3.8'

services:
  # MySQL - Isolado no nó de banco
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: task_manager
      MYSQL_USER: TASKAPP
      MYSQL_PASSWORD: TaskAppPassword123!
      MYSQL_ROOT_PASSWORD: RootSecurePassword456!
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.tipo == db

  # Backend - Isolado no nó de aplicação
  backend:
    image: victor584198156/taskmanager-backend:v1
    environment:
      DB_HOST: db
      DB_USER: TASKAPP
      DB_PASSWORD: TaskAppPassword123!
      DB_NAME: task_manager
      PORT: 5000
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.tipo == app

  # Frontend - Isolado no nó de aplicação
  frontend:
    image: victor584198156/taskmanager-frontend:v1
    environment:
      API_URL: http://backend:5000
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.tipo == app

  # Proxy Reverso Nginx - Isolado no Manager (Único exposto para a internet)
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

networks:
  app-network:
    driver: overlay
    attachable: true

volumes:
  db_data:
    driver: local
