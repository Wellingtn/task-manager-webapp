version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: task_manager
      MYSQL_USER: grupo2
      MYSQL_PASSWORD: grupo2123
      MYSQL_ROOT_PASSWORD: grupo2123
    ports:
      - "3306:3306"
    deploy:
      mode: replicated
      replicas: 1
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: victor584198156/taskmanager-backend:v1
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: on-failure

  frontend:
    image: victor584198156/taskmanager-frontend:v1
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: on-failure

volumes:
  mysql_data:
