<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victor Meneghetti</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="card header-card">
        <div>
          <p class="eyebrow">App web simples</p>
          <h1>Victor Menegheti</h1>
          <p class="subtitle">
            Cadastre, edite, conclua e exclua tarefas em uma interface simples.
          </p>
        </div>
        <button id="refreshButton" class="secondary-button" type="button">
          Atualizar lista
        </button>
      </section>

      <section class="card">
        <h2 id="formTitle">Nova tarefa</h2>

        <form id="taskForm" class="task-form">
          <input type="hidden" id="taskId" />

          <div class="field">
            <label for="title">Título</label>
            <input
              id="title"
              name="title"
              type="text"
              maxlength="255"
              placeholder="Ex.: Estudar Node.js"
              required
            />
          </div>

          <div class="field">
            <label for="description">Descrição</label>
            <textarea
              id="description"
              name="description"
              rows="4"
              placeholder="Detalhes da tarefa..."
            ></textarea>
          </div>

          <div class="field hidden" id="statusField">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option value="pendente">Pendente</option>
              <option value="concluida">Concluída</option>
            </select>
          </div>

          <div class="actions">
            <button type="submit" class="primary-button" id="submitButton">
              Salvar tarefa
            </button>
            <button type="button" class="secondary-button hidden" id="cancelEditButton">
              Cancelar edição
            </button>
          </div>
        </form>

        <p id="formMessage" class="message" aria-live="polite"></p>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Tarefas</h2>

          <div class="filters">
            <button class="filter-button active" data-filter="todas" type="button">
              Todas
            </button>
            <button class="filter-button" data-filter="pendente" type="button">
              Pendentes
            </button>
            <button class="filter-button" data-filter="concluida" type="button">
              Concluídas
            </button>
          </div>
        </div>

        <div id="loading" class="loading hidden">Carregando...</div>
        <div id="taskList" class="task-list"></div>
        <p id="emptyState" class="empty-state hidden">
          Nenhuma tarefa encontrada.
        </p>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
